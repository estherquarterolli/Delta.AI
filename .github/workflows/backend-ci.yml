name: backend-ci

# Roda em PRs e em push em branches que não sejam main (deploy real
# fica a cargo de backend-deploy.yml, disparado só em push na main).
# Restrito a mudanças relevantes de backend pra não rodar à toa em
# PRs que só tocam web/, docs/, etc.
on:
  pull_request:
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/backend-ci.yml"
  push:
    branches-ignore:
      - main
    paths:
      - "app/**"
      - "tests/**"
      - "pyproject.toml"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/backend-ci.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: |
            app/requirements.txt
            pyproject.toml

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r app/requirements.txt
          pip install ruff pytest pytest-asyncio httpx

      - name: Lint (ruff)
        run: ruff check .

      - name: Testes (pytest)
        run: pytest
