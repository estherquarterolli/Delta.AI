# docker-compose.yml — ambiente de desenvolvimento local
#
# Este compose sobe o backend FastAPI e também um container do
# Supabase CLI oficial para rodar o ambiente local via `supabase start`.
#
# Fluxo recomendado:
#   1) cp .env.example .env
#   2) docker compose up -d supabase
#   3) docker compose up -d backend
#   4) supabase status (opcional, para ver URLs e chaves)

services:
  supabase:
    image: supabase/cli:latest
    command: start --ignore-health-check
    working_dir: /workspace
    volumes:
      - .:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "54321:54321"
      - "54322:54322"
      - "54323:54323"
    environment:
      SUPABASE_URL: ${SUPABASE_URL:-http://127.0.0.1:54321}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-test-anon-key}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-test-service-role-key}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-super-secret-jwt}
    healthcheck:
      test: ["CMD", "sh", "-c", "curl -fsS http://127.0.0.1:54321/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      SUPABASE_URL: ${SUPABASE_URL:-http://127.0.0.1:54321}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY:-test-anon-key}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY:-test-service-role-key}
    volumes:
      - ./app:/code/app
    depends_on:
      - supabase
